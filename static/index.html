<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORA 外送报表云端生成</title>
    <link rel="stylesheet" href="/assets/styles.css?v=cloud-20260703-ora17" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>ORA 外送报表云端生成</h1>
          <p id="periodText">待识别周期</p>
        </div>
        <div class="actions">
          <button id="clearBtn" class="ghost" type="button">清空</button>
          <button id="generateBtn" class="primary" type="button">生成报表</button>
        </div>
      </header>

      <section class="workspace">
        <div class="dropzone" id="dropzone">
          <input id="bulkInput" type="file" accept=".xlsx,.xls" multiple />
          <div class="dropCopy">
            <strong>批量上传 17 个表格</strong>
            <span>拖入或选择全部源表，也可以在下方逐项补传</span>
          </div>
        </div>

        <aside class="side">
          <div class="periodGroup">
            <div class="periodTitle">本期周期</div>
            <label>
              开始日期
              <input id="currentStartDate" type="date" />
            </label>
            <label>
              结束日期
              <input id="currentEndDate" type="date" />
            </label>
          </div>
          <div class="periodGroup">
            <div class="periodTitle">上期周期</div>
            <label>
              开始日期
              <input id="previousStartDate" type="date" />
            </label>
            <label>
              结束日期
              <input id="previousEndDate" type="date" />
            </label>
          </div>
          <div class="statusBox">
            <span id="readyCount">0/17</span>
            <span id="statusText">等待上传</span>
          </div>
          <progress id="progress" value="0" max="100"></progress>
        </aside>
      </section>

      <section class="sourcePanel">
        <div class="sourceHeader">
          <div>
            <h2>需要上传的数据源（17项）</h2>
            <p>上传上一期报表、报表模板和本期源表；系统会优先按表头/工作表内容识别，文件名作为兜底。</p>
          </div>
          <span>批量上传 / 单项补传</span>
        </div>
        <section class="fileGrid" id="fileGrid"></section>
      </section>

      <section class="logPanel">
        <h2>运行记录</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="/assets/app.js?v=cloud-20260703-ora17"></script>
  </body>
</html>
